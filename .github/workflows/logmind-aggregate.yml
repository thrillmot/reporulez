name: logmind decision aggregator

# When a PR is merged, append a one-line summary entry to docs/decisions.md
# linking the PR and the per-branch decision log. Originally installed by
# `logmind init`; rewritten here to open a PR with the aggregated commit
# instead of pushing directly to the default branch, because the reporulez
# ruleset on this repo requires all changes to land via PR.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: logmind-aggregate-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  aggregate:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref != 'logmind-aggregate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install logmind
        run: pip install 'logmind==0.1.1'

      - name: Aggregate merged-branch decisions
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: python -m logmind.actions.aggregate

      - name: Bail if no changes
        id: changes
        run: |
          if git diff --quiet -- docs/; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "No aggregation changes to commit."
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update aggregator PR
        id: aggregator_pr
        if: steps.changes.outputs.no_changes != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # IMPORTANT: must be a PAT or GitHub App installation token, NOT
          # secrets.GITHUB_TOKEN. PRs opened with the default GITHUB_TOKEN
          # do not trigger downstream workflows (including required status
          # checks), which would make this PR permanently unmergeable under
          # the repo's ruleset. Setup: create a fine-grained PAT scoped to
          # this repo with contents:write + pull_requests:write, store as
          # repo secret LOGMIND_BOT_PAT.
          token: ${{ secrets.LOGMIND_BOT_PAT }}
          branch: logmind-aggregate
          base: ${{ github.event.pull_request.base.ref }}
          commit-message: "logmind: aggregate decisions from #${{ github.event.pull_request.number }}"
          title: "logmind: aggregate decision logs"
          body: |
            Auto-generated by the logmind aggregator. Appends per-branch decision summaries
            to `docs/decisions.md` whenever a feature PR merges. Safe to squash-merge —
            content is regenerated deterministically by `python -m logmind.actions.aggregate`.

            Triggered by PR #${{ github.event.pull_request.number }}.
          add-paths: |
            docs/**
          author: "logmind-bot <logmind@users.noreply.github.com>"
          committer: "logmind-bot <logmind@users.noreply.github.com>"
          delete-branch: true

      - name: Enable auto-merge on the aggregator PR
        if: steps.aggregator_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.LOGMIND_BOT_PAT }}
          PR_NUM: ${{ steps.aggregator_pr.outputs.pull-request-number }}
        run: gh pr merge "$PR_NUM" --auto --squash
