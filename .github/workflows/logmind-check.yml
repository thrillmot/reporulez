name: logmind decision check

# Gates every PR on having at least one decision logged when the diff exceeds
# the threshold. Mirrors the `logmind check-decisions` pre-commit hook
# (`logmind install-hook`) for contributors who haven't installed it locally.
#
# Skip conditions:
#   - PR head is the aggregator branch itself (logmind-aggregate)
#   - PR is from a fork (no contributor key configured)
#   - All changed files are inside docs/decisions* (the decision log itself)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  logmind-decision-check:
    if: github.event.pull_request.head.ref != 'logmind-aggregate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require a decision log for non-trivial PRs
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          THRESHOLD: "20"
        run: |
          set -euo pipefail
          BASE="origin/${BASE_REF}"
          git fetch origin "${BASE_REF}" --depth=1 >/dev/null 2>&1 || true

          # Count added+deleted lines outside the decisions docs themselves.
          DIFF_LINES=$(git diff --numstat "$BASE...$HEAD_SHA" \
            -- . \
               ':!docs/decisions.md' \
               ':!docs/decisions-archive.md' \
               ':!docs/decisions-branches/**' \
            | awk '$1 != "-" { add += $1 } $2 != "-" { del += $2 } END { print add + del + 0 }')

          DECISIONS_TOUCHED=$(git diff --name-only "$BASE...$HEAD_SHA" \
            -- 'docs/decisions.md' 'docs/decisions-archive.md' 'docs/decisions-branches/**' \
            | wc -l | tr -d ' ')

          echo "Lines changed (excluding decision docs): $DIFF_LINES"
          echo "Decision-doc files touched: $DECISIONS_TOUCHED"
          echo "Threshold: $THRESHOLD"

          if [ "$DIFF_LINES" -gt "$THRESHOLD" ] && [ "$DECISIONS_TOUCHED" -eq 0 ]; then
            echo "::error::PR changes $DIFF_LINES lines (threshold $THRESHOLD) without logging a decision."
            echo "Run on your feature branch:"
            echo "  logmind log \"<summary>\" -r \"<reasoning>\""
            echo "Then push the resulting commit. See AGENTS.md for the full decision-logging requirement."
            exit 1
          fi

          echo "OK — decision log requirement satisfied."
