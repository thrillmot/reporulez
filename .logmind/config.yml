# logmind configuration
# This file controls how logmind behaves in this project

# Git integration
git:
  # Automatically commit after logging a decision
  auto_commit: true

  # Automatically push after committing
  auto_push: true

  # Commit message template
  # Available variables: {decision}
  commit_message_template: "logmind: {decision}"

# Decision management
decisions:
  # Maximum number of recent decisions to keep in decisions.md
  # Older decisions are moved to decisions-archive.md
  max_recent: 20

  # Route feature-branch decisions to docs/decisions-branches/<branch>.md
  # The default branch always writes to docs/decisions.md.
  # Set to false to log every branch into the same file (legacy behavior).
  branch_aware: true

# File structure generation
file_structure:
  # Update file-structure.md on every log
  auto_update: true

  # Directories to ignore in tree output
  ignore_patterns:
    - __pycache__
    - .git
    - node_modules
    - venv
    - .venv
    - env
    - .env
    - "*.pyc"
    - .pytest_cache
    - .mypy_cache
    - dist
    - build
    - "*.egg-info"

# AI Agent configuration
# Set to true to enable an agent, false to disable
agents:
  claude: true       # CLAUDE.md
  cursor: true       # .cursorrules
  copilot: false     # .github/copilot-instructions.md
  windsurf: false    # .windsurfrules
  aider: false       # CONVENTIONS.md
  continue: false    # .continuerules
  cody: false        # .sourcegraph/cody.json
  zed: false         # .zed/settings.json
  amazonq: false     # .amazonq/rules.md
  cline: false       # .clinerules
  codex: false       # AGENTS.md (OpenAI Codex / universal standard)
